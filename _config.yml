title: My Blog
email: your-email@example.com
description: >-
  A simple and clean blog built with Jekyll and hosted on GitHub Pages.

baseurl: ""
url: "https://yourusername.github.io"

twitter_username: 
github_username: 

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Pagination (optional, requires jekyll-paginate plugin)
# paginate: 5
# paginate_path: "/page:num/"

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
